<head>
  <title>Rock, Paper, Scissors Game!</title>
</head>
<body>
  <h1>Rock, Paper, Scissors Game!</h1>

  <button onclick="
    playGame('Rock');
  ">Rock</button>

  <button onclick="
    playGame('Paper');
  ">Paper</button>

  <button onclick="
    playGame('Scissors');
  ">Scissors</button>

  <p class="onpage-score"></p>
  <p class="onpage-result"></p>

  <button onclick="
    score.wins = 0; score.losses = 0; score.ties = 0;
    localStorage.removeItem('score');
    updateScoreElement();
    document.querySelector('.onpage-result').innerHTML = '';
    alert('Score reseted succesfully.');
  ">
    Reset Score
  </button>

  <script>
    let score = JSON.parse(localStorage.getItem("score")) || {
        "wins": 0,
        "losses": 0,
        "ties": 0
      };

    updateScoreElement();

    function playGame(userChoice) {
      const randomNumber = Math.random();
      let computerChoice;
      let result;

      if (randomNumber >= 0 && randomNumber < 1/3) {
        computerChoice = 'Rock';
      } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
        computerChoice = 'Paper';
      } else if (randomNumber >= 2/3 && randomNumber < 1) {
        computerChoice = 'Scissors';
      }

      if (userChoice === computerChoice) {
        result = "Its a Draw."
        score.ties++;
      } else if (
        (userChoice === "Rock" && computerChoice === "Scissors") ||
        (userChoice === "Paper" && computerChoice === "Rock")  || 
        (userChoice === "Scissors" && computerChoice === "Paper")
      ) {
        result = "You win!";
        score.wins++;
      } else {
        result = "You lose.";
        score.losses++;
      }

      localStorage.setItem("score", JSON.stringify(score));

      const message = `Your choice: ${userChoice}. Computer's choice: ${computerChoice}<br>${result}`;

      document.querySelector(".onpage-result").innerHTML = message;
      updateScoreElement();
    }

    function updateScoreElement() {
      document.querySelector(".onpage-score")
      .innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}<br>`;
    }


  </script>

</body>
