<head>
  <title>Rock, Paper, Scissors Game!</title>
</head>
<body>
  <h1>Rock, Paper, Scissors Game!</h1>

  <button onclick="
    playGame('Rock');
  ">Rock</button>

  <button onclick="
    playGame('Paper');
  ">Paper</button>

  <button onclick="
    playGame('Scissors');
  ">Scissors</button>

  <button onclick="
    score.wins = 0; score.losses = 0; score.ties = 0;
    alert('Score reseted succesfully.');
  ">
    Reset Score
  </button>

  <script>
    const score = {
      wins: 0,
      losses: 0,
      ties: 0
    };

    function playGame(userChoice) {
      const randomNumber = Math.random();
      let computerChoice;
      let result;

      if (randomNumber >= 0 && randomNumber < 1/3) {
        computerChoice = 'Rock';
      } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
        computerChoice = 'Paper';
      } else if (randomNumber >= 2/3 && randomNumber < 1) {
        computerChoice = 'Scissors';
      }

      if (userChoice === computerChoice) {
        result = "Its a Draw."
        score.ties++;
      } else if (
        (userChoice === "Rock" && computerChoice === "Scissors") ||
        (userChoice === "Paper" && computerChoice === "Rock")  || 
        (userChoice === "Scissors" && computerChoice === "Paper")
      ) {
        result = "You win!";
        score.wins++;
      } else {
        result = "You lose.";
        score.losses++;
      }

      const message = `Your choice: ${userChoice}. Computer's choice: ${computerChoice}\n${result}\n\nWins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;

      console.log(message)
      alert(message)
    }
  </script>

</body>
