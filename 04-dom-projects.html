<!DOCTYPE html>
<html>
  <head>
    <title>DOM Practice</title>
  </head>
  <body>
    <h2>Youtube Subscribe Button</h2>
    <button class="subscribe-button" onclick="
      changeButton();
      subscribed = !subscribed; 
    ">
      Subscribe
    </button>


    <h2>Amazon Shipping Calculator</h2>

    <p>Order under $40 = +$10 shipping charge</p>
    <p>Order over $40 = FREE shipping charge</p>

    <input type="number" placeholder="Cost of item" name="cost" id="cost" onkeydown="
      if (event.key === 'Enter') {
        calCost();
      }
    ">
    <button onclick="
      calCost();
    ">
      Calculate
    </button>
    <p class="total-cost"></p>


    <script>
      let subscribed = 0;

      function changeButton() {
        if (!subscribed) {
          document.querySelector('.subscribe-button').innerHTML='Subscribed';
        } else {
          document.querySelector('.subscribe-button').innerHTML='Subscribe';
        }
      }

      function calCost() {
        let cost = document.querySelector("#cost").value;
        cost = cost < 40 ? +cost + 10 : cost

        document.querySelector(".total-cost").innerHTML = `Total cost: $${cost}`
      }
      
    </script>
  </body>
</html>
