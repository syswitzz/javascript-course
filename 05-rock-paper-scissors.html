<head>
  <title>Rock, Paper, Scissors Game!</title>
  <link rel="stylesheet" href="05-rock-paper-scissors.css">
</head>

<body>
  <h1 class="heading">Rock, Paper, Scissors Game!</h1>

  <button class="emoji-button" onclick="
    playGame('Rock');
  ">
    <img class="emoji" src="images/rock-emoji.png" alt="Rock">
  </button>

  <button class="emoji-button" onclick="
    playGame('Paper');
  ">
    <img class="emoji" src="images/paper-emoji.png" alt="Rock">
  </button>

  <button class="emoji-button" onclick="
    playGame('Scissors');
  ">
    <img class="emoji" src="images/scissors-emoji.png" alt="Rock">
  </button>

  <p class="js-onpage-result result-text"></p>
  <p class="js-onpage-choice choice-text"></p>
  <p class="js-onpage-score score-text"></p>
  
  <button class="reset-button" onclick="
    score.wins = 0; score.losses = 0; score.ties = 0;
    localStorage.removeItem('score');
    updateScoreElement();
    document.querySelector('.js-onpage-result').innerHTML = '';
    document.querySelector('.js-onpage-choice').innerHTML = '';
    alert('Score reseted succesfully.');
  ">
    Reset Score
  </button>

  <script src="05-rock-paper-scissors.js"></script>
</body>
