<body>
  <h1>Rock, Paper, Scissors Game!</h1>

  <button onclick="
    const userChoice = 'Rock'
    const randomNumber = Math.random();
    let computerChoice;
    let result;

    if (randomNumber >= 0 && randomNumber < 1/3) {
      computerChoice = 'Rock';
      result = 'Its a Draw.';
    } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
      computerChoice = 'Paper';
      result = 'You lose!';
    } else if (randomNumber >= 2/3 && randomNumber < 1) {
      computerChoice = 'Scissors';
      result = 'You win!';
    }

    console.log(`Your choice: ${userChoice}. Computer's choice: ${computerChoice}\n${result}`)
    alert(`Your choice: ${userChoice}. Computer's choice: ${computerChoice}\n${result}`)
  ">Rock</button>
